# .github/workflows/ci.yml
name: CI — Lint & Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: lint + build + test ─────────────────────────────────────────────
  backend:
    name: Backend (NestJS)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test -- --passWithNoTests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          SUPABASE_JWT_SECRET: test-secret

  # ── Frontend: lint + build ────────────────────────────────────────────────────
  frontend:
    name: Frontend (Nuxt 4)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || true   # non-blocking until strict mode

      - name: Build
        run: npm run build
        env:
          NUXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NUXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          NUXT_PUBLIC_API_BASE_URL: http://localhost:4000
