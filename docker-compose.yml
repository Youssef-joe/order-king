version: '3.9'

services:
  # ── PostgreSQL (local dev only — use Supabase in production) ────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: orderking
      POSTGRES_PASSWORD: orderking_secret
      POSTGRES_DB: orderking
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U orderking']
      interval: 5s
      timeout: 5s
      retries: 5

  # ── NestJS Backend ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://orderking:orderking_secret@postgres:5432/orderking?schema=public
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      PORT: 4000
      FRONTEND_URL: http://localhost:3000
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
      - /app/dist

  # ── Nuxt 4 Frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NUXT_PUBLIC_API_BASE_URL: http://localhost:4000
      NUXT_PUBLIC_SUPABASE_URL: ${NUXT_PUBLIC_SUPABASE_URL}
      NUXT_PUBLIC_SUPABASE_ANON_KEY: ${NUXT_PUBLIC_SUPABASE_ANON_KEY}
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  postgres_data:
